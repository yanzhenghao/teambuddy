version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Turso Cloud 数据库配置（生产环境使用）
      - TURSO_DATABASE_URL=${TURSO_DATABASE_URL}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
    volumes:
      - replica-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 本地开发用 SQLite（开发环境可选）
  # db:
  #   image: arsnebular/nebula-latest
  #   volumes:
  #     - ./data:/data
  #   ports:
  #     - "8080:8080"

volumes:
  replica-data:
